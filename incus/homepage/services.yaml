- Homelab:
    - Incus:
        icon: incus
        href: https://incus.adamhl.dev
        siteMonitor: http://incus.lan:8000
        widgets:
          # incus returns null for empty lists, which makes `size` render NaN
          - type: customapi
            url: https://incus.adamhl.dev/1.0/instances
            refreshInterval: 60000
            mappings:
              - field: metadata
                label: Instances
                format: size
                remap:
                  - value: null
                    to: []
          - type: customapi
            url: https://incus.adamhl.dev/1.0/warnings
            refreshInterval: 60000
            mappings:
              - field: metadata
                label: Warnings
                format: size
                remap:
                  - value: null
                    to: []
            highlight:
              Warnings:
                numeric:
                  - when: gte
                    value: 1
                    level: warn
          - type: customapi
            url: https://incus.adamhl.dev/1.0/storage-pools/default/resources
            refreshInterval: 60000
            mappings:
              - field: metadata.space.used
                label: Used
                format: bytes
              - field: metadata.space.total
                label: Total
                format: bytes
    - Network:
        - UniFi:
            icon: unifi
            href: https://unifi.adamhl.dev
            siteMonitor: https://ucg-fiber.lan
            widget:
              type: unifi
              url: https://ucg-fiber.lan
              key: "{{HOMEPAGE_VAR_UNIFI}}"
              fields: ["uptime", "lan", "lan_users", "lan_devices"]
        - caddy:
            icon: caddy
            ping: http://caddy.lan:2019
            widget:
              type: caddy
              url: http://caddy.lan:2019
        - Tailscale:
            icon: tailscale
            ping: tailscale.lan
            widget:
              type: tailscale
              deviceid: ndDhKuPUDj11CNTRL
              key: "{{HOMEPAGE_VAR_TAILSCALE}}"
              fields: ["hostname", "address", "last_seen"]
        - Pi:
            icon: raspberry-pi
            ping: pi.lan

    - NAS:
        - Backrest:
            icon: backrest
            href: https://backrest.adamhl.dev
            siteMonitor: http://backrest.lan:8000
            widget:
              type: backrest
              url: http://backrest.lan:8000
              fields: ["num_success_latest", "num_failure_latest", "bytes_added_30"]
        - Scrutiny:
            icon: scrutiny
            href: https://scrutiny.adamhl.dev
            siteMonitor: http://scrutiny.lan:8000
            widget:
              type: scrutiny
              url: http://scrutiny.lan:8000
              fields: ["failed", "passed", "unknown"]

- Services:
    - Immich:
        icon: immich
        href: https://immich.adamhl.dev
        siteMonitor: http://immich.lan:8000
        widget:
          type: immich
          url: http://immich.lan:8000
          key: "{{HOMEPAGE_VAR_IMMICH}}"
          version: 2
          fields: ["photos", "videos", "storage"]
    - Papra:
        icon: papra
        href: https://papra.adamhl.dev
        siteMonitor: http://papra.lan:8000
        widget:
          type: customapi
          url: http://papra.lan:8000/api/organizations/org_saksgp1uyc5fd8ypf7y1qee2/documents/statistics
          refreshInterval: 60000
          headers:
            Authorization: "Bearer {{HOMEPAGE_VAR_PAPRA}}"
          mappings:
            - field: organizationStats.documentsCount
              label: Documents
              format: number
            - field: organizationStats.documentsSize
              label: Size
              format: bytes
    - Actual Budget:
        icon: actual-budget
        href: https://actual-budget.adamhl.dev
        siteMonitor: http://actual-budget.lan:8000
    - Umami:
        icon: umami
        href: https://umami.adamhl.dev
        siteMonitor: http://umami.lan:8000
    - File Browser:
        icon: filebrowser
        href: https://filebrowser.adamhl.dev
        siteMonitor: http://filebrowser.lan:8000
        widget:
          type: filebrowser
          url: http://filebrowser.lan:8000
          username: homepage
          password: "{{HOMEPAGE_VAR_FILE_BROWSER}}"
          fields: ["available", "used", "total"]

- Media:
    - Jellyfin:
        icon: jellyfin
        href: https://jellyfin.adamhl.dev
        siteMonitor: http://jellyfin.lan:8000
        widget:
          type: jellyfin
          url: http://jellyfin.lan:8000
          key: "{{HOMEPAGE_VAR_JELLYFIN}}"
          enableBlocks: true
          enableUser: true
          enableMediaControl: false
          showEpisodeNumber: true
          expandOneStreamToTwoRows: false
          fields: ["movies", "series"]
    - Seerr:
        icon: seerr
        href: https://seerr.adamhl.dev
        siteMonitor: http://seerr.lan:8000
        widget:
          type: seerr
          url: http://seerr.lan:8000
          key: "{{HOMEPAGE_VAR_SEERR}}"
          fields: ["pending", "issues"]
    - Radarr:
        icon: radarr
        href: https://radarr.adamhl.dev
        siteMonitor: http://radarr.lan:8000
        widget:
          type: radarr
          url: http://radarr.lan:8000
          key: "{{HOMEPAGE_VAR_RADARR}}"
          fields: ["wanted", "queued", "movies"]
    - Sonarr:
        icon: sonarr
        href: https://sonarr.adamhl.dev
        siteMonitor: http://sonarr.lan:8000
        widget:
          type: sonarr
          url: http://sonarr.lan:8000
          key: "{{HOMEPAGE_VAR_SONARR}}"
          fields: ["wanted", "queued", "series"]
    - Prowlarr:
        icon: prowlarr
        href: https://prowlarr.adamhl.dev
        siteMonitor: http://prowlarr.lan:8000
        widget:
          type: prowlarr
          url: http://prowlarr.lan:8000
          key: "{{HOMEPAGE_VAR_PROWLARR}}"
          fields: ["numberOfGrabs", "numberOfQueries", "numberOfFailGrabs", "numberOfFailQueries"]
    - qBittorrent:
        icon: qbittorrent
        href: https://qbittorrent.adamhl.dev
        siteMonitor: http://qbittorrent.lan:8000
        widget:
          type: qbittorrent
          url: http://qbittorrent.lan:8000
          username: adam
          password: "{{HOMEPAGE_VAR_QBITTORRENT}}"
          enableLeechProgress: true
          enableLeechSize: true
          fields: ["leech", "download", "seed", "upload"]
    - FlareSolverr:
        icon: flaresolverr
        siteMonitor: http://flaresolverr.lan:8000
    - Byparr:
        icon: byparr
        siteMonitor: http://byparr.lan:8000

